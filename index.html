<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gerador de Moldura</title>
</head>
<body style="text-align:center; font-family:sans-serif;">

  <h2>Envie sua foto</h2>
  <input type="file" id="upload"><br><br>

  <canvas id="canvas"></canvas><br><br>

  <button onclick="baixar()">Baixar imagem</button>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const fundo = new Image();
    fundo.src = "fundo.jpg"; // sua imagem de fundo

    const moldura = new Image();
    moldura.src = "moldura.png"; // seu aro transparente

    document.getElementById("upload").addEventListener("change", function(e) {
      const file = e.target.files[0];
      const img = new Image();

      img.onload = function() {
        canvas.width = 1080;
        canvas.height = 1920;

        // 1️⃣ Desenha o fundo
        ctx.drawImage(fundo, 0, 0, canvas.width, canvas.height);

        // 2️⃣ Máscara circular
        const x = 290;     // posição X do círculo
        const y = 600;     // posição Y do círculo
        const radius = 250; // raio do círculo

        ctx.save();
        ctx.beginPath();
        ctx.arc(x + radius, y + radius, radius, 0, Math.PI * 2);
        ctx.clip();

        // 3️⃣ Desenha selfie proporcional dentro do círculo
        let sx, sy, sWidth, sHeight;

        if(img.width > img.height) {
          sWidth = img.height;
          sHeight = img.height;
          sx = (img.width - img.height)/2;
          sy = 0;
        } else {
          sWidth = img.width;
          sHeight = img.width;
          sx = 0;
          sy = (img.height - img.width)/2;
        }

        ctx.drawImage(img, sx, sy, sWidth, sHeight, x, y, radius*2, radius*2);
        ctx.restore();

        // 4️⃣ Desenha a moldura por cima
        ctx.drawImage(moldura, 0, 0, canvas.width, canvas.height);
      };

      img.src = URL.createObjectURL(file);
    });

    // função para baixar a imagem final
    function baixar() {
      const link = document.createElement("a");
      link.download = "mockup.png";
      link.href = canvas.toDataURL();
      link.click();
    }
  </script>

</body>
</html>
